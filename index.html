<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YuTube — Personal Player</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a38;
    --red: #ff2d55;
    --red2: #ff6b6b;
    --text: #f0f0f5;
    --muted: #7a7a9a;
    --accent: #ff2d55;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--red);
    letter-spacing: 2px;
    white-space: nowrap;
    cursor: pointer;
  }

  .logo span { color: var(--text); }

  .search-wrap {
    flex: 1;
    max-width: 600px;
    display: flex;
    gap: 0;
  }

  .search-wrap input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-right: none;
    border-radius: 12px 0 0 12px;
    padding: 10px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--red); }
  .search-wrap input::placeholder { color: var(--muted); }

  .search-wrap button {
    background: var(--red);
    border: none;
    border-radius: 0 12px 12px 0;
    padding: 10px 20px;
    color: white;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.2s;
  }

  .search-wrap button:hover { background: var(--red2); }

  /* Main layout */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
  }

  /* Home / Search results */
  #home-page { display: block; }
  #player-page { display: none; }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: var(--red);
    box-shadow: 0 8px 30px rgba(255,45,85,0.15);
  }

  .card-thumb {
    position: relative;
    aspect-ratio: 16/9;
    overflow: hidden;
    background: var(--surface2);
  }

  .card-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
  }

  .card:hover .card-thumb img { transform: scale(1.05); }

  .card-duration {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0,0,0,0.85);
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 6px;
  }

  .play-overlay {
    position: absolute;
    inset: 0;
    background: rgba(255,45,85,0.0);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: all 0.2s;
  }

  .card:hover .play-overlay {
    opacity: 1;
    background: rgba(255,45,85,0.15);
  }

  .play-overlay svg { filter: drop-shadow(0 0 12px rgba(255,45,85,0.8)); }

  .card-info { padding: 14px; }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .card-meta {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    gap: 8px;
  }

  /* Player page */
  .player-layout {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 24px;
  }

  @media (max-width: 900px) {
    .player-layout { grid-template-columns: 1fr; }
  }

  .video-wrap {
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    aspect-ratio: 16/9;
    position: relative;
  }

  video {
    width: 100%;
    height: 100%;
    background: #000;
  }

  .loading-overlay {
    position: absolute;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    color: var(--muted);
    font-size: 13px;
  }

  .video-info { margin-top: 20px; }

  .video-title {
    font-size: 20px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 10px;
  }

  .video-meta {
    color: var(--muted);
    font-size: 13px;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  .download-bar {
    margin-top: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }

  .download-bar h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    margin-bottom: 14px;
    color: var(--muted);
  }

  .dl-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .dl-btn {
    padding: 8px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .dl-btn:hover {
    border-color: var(--red);
    color: var(--red);
    background: rgba(255,45,85,0.08);
  }

  .dl-btn.audio {
    border-color: #7c3aed;
    color: #a78bfa;
  }

  .dl-btn.audio:hover {
    background: rgba(124,58,237,0.1);
  }

  /* Quality selector */
  .quality-bar {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .q-btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .q-btn:hover, .q-btn.active {
    border-color: var(--red);
    color: var(--red);
    background: rgba(255,45,85,0.08);
  }

  /* Sidebar */
  .sidebar {}

  .sidebar-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .related-list { display: flex; flex-direction: column; gap: 12px; }

  .related-card {
    display: flex;
    gap: 12px;
    cursor: pointer;
    padding: 10px;
    border-radius: 12px;
    border: 1px solid transparent;
    transition: all 0.2s;
  }

  .related-card:hover {
    background: var(--surface);
    border-color: var(--border);
  }

  .related-thumb {
    width: 120px;
    min-width: 120px;
    aspect-ratio: 16/9;
    border-radius: 8px;
    overflow: hidden;
    background: var(--surface2);
  }

  .related-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .related-info { flex: 1; overflow: hidden; }

  .related-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .related-meta { font-size: 11px; color: var(--muted); }

  /* States */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .empty-state .big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    color: var(--border);
    line-height: 1;
    margin-bottom: 12px;
  }

  .loading-state {
    display: flex;
    justify-content: center;
    padding: 60px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    margin-bottom: 20px;
    transition: color 0.2s;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
  }

  .back-btn:hover { color: var(--text); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 13px;
    transition: transform 0.3s;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo" onclick="goHome()">YU<span>TUBE</span></div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Cari video..." onkeydown="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()">🔍</button>
  </div>
</header>

<main>
  <!-- HOME PAGE -->
  <div id="home-page">
    <div id="home-content">
      <div class="empty-state">
        <div class="big">▶</div>
        <div style="font-size:18px;font-weight:600;margin-bottom:8px;">YuTube Personal Player</div>
        <div style="font-size:14px;">Tonton YouTube tanpa iklan. Cari video di atas untuk mulai.</div>
      </div>
    </div>
  </div>

  <!-- PLAYER PAGE -->
  <div id="player-page">
    <button class="back-btn" onclick="goHome()">← Kembali</button>
    <div class="player-layout">
      <div>
        <div class="video-wrap">
          <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <div class="loading-text">Memuat video...</div>
          </div>
          <video id="videoEl" controls></video>
        </div>

        <div class="video-info">
          <div class="video-title" id="videoTitle">—</div>
          <div class="video-meta">
            <span id="videoUploader">—</span>
          </div>

          <div style="margin-top:12px;">
            <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">Kualitas stream:</div>
            <div class="quality-bar" id="qualityBar"></div>
          </div>

          <div class="download-bar">
            <h3>Download</h3>
            <div class="dl-buttons" id="dlButtons">
              <span style="color:var(--muted);font-size:13px;">Memuat opsi...</span>
            </div>
          </div>
        </div>
      </div>

      <div class="sidebar">
        <div class="sidebar-title">Video Terkait</div>
        <div class="related-list" id="relatedList">
          <div style="color:var(--muted);font-size:13px;">—</div>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  let currentId = null;
  let currentQuality = "720";

  function formatDur(s) {
    if (!s) return "";
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
    if (h > 0) return h+":"+String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");
    return m+":"+String(sec).padStart(2,"0");
  }

  function formatViews(n) {
    if (!n) return "";
    if (n >= 1e6) return (n/1e6).toFixed(1)+"M views";
    if (n >= 1e3) return (n/1e3).toFixed(0)+"K views";
    return n+" views";
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 3000);
  }

  async function doSearch() {
    const q = document.getElementById("searchInput").value.trim();
    if (!q) return;

    const home = document.getElementById("home-content");
    home.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';
    document.getElementById("home-page").style.display = "block";
    document.getElementById("player-page").style.display = "none";

    try {
      const res = await fetch("/api/search?q=" + encodeURIComponent(q));
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      if (!data.results.length) {
        home.innerHTML = '<div class="empty-state"><div>Tidak ada hasil untuk "<b>' + q + '</b>"</div></div>';
        return;
      }

      home.innerHTML = '<div class="section-title">HASIL PENCARIAN — ' + data.results.length + ' VIDEO</div><div class="grid" id="grid"></div>';
      const grid = document.getElementById("grid");
      data.results.forEach(v => {
        grid.innerHTML += `
          <div class="card" onclick="playVideo('${v.id}')">
            <div class="card-thumb">
              <img src="${v.thumbnail}" loading="lazy" onerror="this.src='https://img.youtube.com/vi/${v.id}/mqdefault.jpg'">
              <div class="play-overlay">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                  <circle cx="24" cy="24" r="24" fill="rgba(255,45,85,0.9)"/>
                  <path d="M19 16l14 8-14 8V16z" fill="white"/>
                </svg>
              </div>
              ${v.duration ? '<div class="card-duration">'+formatDur(v.duration)+'</div>' : ''}
            </div>
            <div class="card-info">
              <div class="card-title">${v.title}</div>
              <div class="card-meta">
                <span>${v.uploader || ''}</span>
                <span>${formatViews(v.view_count)}</span>
              </div>
            </div>
          </div>`;
      });
    } catch(e) {
      home.innerHTML = '<div class="empty-state"><div>Error: ' + e.message + '</div></div>';
    }
  }

  async function playVideo(id, quality) {
    currentId = id;
    currentQuality = quality || "720";

    document.getElementById("home-page").style.display = "none";
    document.getElementById("player-page").style.display = "block";
    document.getElementById("loadingOverlay").style.display = "flex";
    document.getElementById("videoTitle").textContent = "Memuat...";
    document.getElementById("videoUploader").textContent = "";
    document.getElementById("qualityBar").innerHTML = "";
    document.getElementById("dlButtons").innerHTML = '<span style="color:var(--muted);font-size:13px;">Memuat opsi...</span>';
    document.getElementById("relatedList").innerHTML = '<div style="color:var(--muted);font-size:13px;">Memuat...</div>';

    window.scrollTo(0, 0);

    try {
      // Ambil info dan stream URL bersamaan
      const [infoRes, streamRes] = await Promise.all([
        fetch("/api/info?id=" + id),
        fetch("/api/stream?id=" + id + "&q=" + currentQuality)
      ]);

      const info = await infoRes.json();
      const stream = await streamRes.json();

      if (info.error) throw new Error(info.error);
      if (stream.error) throw new Error(stream.error);

      // Set video
      const video = document.getElementById("videoEl");
      video.src = stream.url;
      video.play().catch(() => {});

      document.getElementById("loadingOverlay").style.display = "none";
      document.getElementById("videoTitle").textContent = info.title;
      document.getElementById("videoUploader").textContent = info.uploader;

      // Quality buttons
      const qBar = document.getElementById("qualityBar");
      const qualities = ["360", "480", "720"];
      qualities.forEach(q => {
        const btn = document.createElement("button");
        btn.className = "q-btn" + (q === currentQuality ? " active" : "");
        btn.textContent = q + "p";
        btn.onclick = () => {
          document.querySelectorAll(".q-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          playVideo(id, q);
        };
        qBar.appendChild(btn);
      });

      // Download buttons
      const dlDiv = document.getElementById("dlButtons");
      dlDiv.innerHTML = "";
      ["360", "480", "720"].forEach(q => {
        const a = document.createElement("a");
        a.href = "/api/download?id=" + id + "&mode=video&q=" + q;
        a.target = "_blank";
        a.className = "dl-btn";
        a.innerHTML = "⬇ MP4 " + q + "p";
        dlDiv.appendChild(a);
      });

      const audioBtn = document.createElement("a");
      audioBtn.href = "/api/download?id=" + id + "&mode=audio";
      audioBtn.target = "_blank";
      audioBtn.className = "dl-btn audio";
      audioBtn.innerHTML = "🎵 Audio Only";
      dlDiv.appendChild(audioBtn);

      // Related - search dengan judul
      const relKeyword = info.title.split(" ").slice(0, 4).join(" ");
      fetch("/api/search?q=" + encodeURIComponent(relKeyword)).then(r => r.json()).then(data => {
        const list = document.getElementById("relatedList");
        list.innerHTML = "";
        (data.results || []).filter(v => v.id !== id).slice(0, 8).forEach(v => {
          list.innerHTML += `
            <div class="related-card" onclick="playVideo('${v.id}')">
              <div class="related-thumb">
                <img src="${v.thumbnail}" loading="lazy" onerror="this.src='https://img.youtube.com/vi/${v.id}/mqdefault.jpg'">
              </div>
              <div class="related-info">
                <div class="related-title">${v.title}</div>
                <div class="related-meta">${v.uploader || ''} · ${formatDur(v.duration)}</div>
              </div>
            </div>`;
        });
      });

    } catch(e) {
      document.getElementById("loadingOverlay").innerHTML =
        '<div style="color:#ff6b6b;text-align:center;padding:20px;">❌ Gagal memuat video<br><small>' + e.message + '</small></div>';
    }
  }

  function goHome() {
    document.getElementById("home-page").style.display = "block";
    document.getElementById("player-page").style.display = "none";
    const video = document.getElementById("videoEl");
    video.pause();
    video.src = "";
  }
</script>
</body>
</html>
