<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TubePlay</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --border: #2a2a38;
    --accent: #ff4d4d;
    --accent2: #ff8c42;
    --text: #f0f0f8;
    --muted: #6b6b80;
    --glow: rgba(255,77,77,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none;
    z-index:0;
    opacity:.4;
  }

  /* Header */
  header {
    position: sticky;
    top:0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .search-bar {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 16px;
    gap: 10px;
    flex: 1;
    max-width: 480px;
    margin: 0 24px;
    transition: border-color .2s, box-shadow .2s;
  }
  .search-bar:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }
  .search-bar input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    flex: 1;
  }
  .search-bar input::placeholder { color: var(--muted); }
  .search-bar button {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    transition: color .2s;
    padding: 2px;
  }
  .search-bar button:hover { color: var(--accent); }

  /* Main layout */
  main {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 24px;
    padding: 24px 28px;
    max-width: 1400px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* Player section */
  .player-section {}

  .player-wrap {
    background: var(--surface);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }

  /* YouTube iframe container */
  .yt-container {
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    background: #000;
  }
  .yt-container iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  /* Audio mode overlay */
  .audio-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 5;
  }
  .audio-overlay.active { display: flex; }

  .vinyl {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #1a1a24, #2a2a38, #1a1a24, #ff4d4d22, #1a1a24);
    position: relative;
    animation: spin 4s linear infinite;
    animation-play-state: paused;
    box-shadow: 0 0 40px rgba(255,77,77,0.2), 0 0 80px rgba(255,77,77,0.1);
  }
  .vinyl.playing { animation-play-state: running; }
  .vinyl::after {
    content:'';
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:30px; height:30px;
    border-radius:50%;
    background: var(--bg);
    border: 3px solid var(--border);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .audio-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--text);
    text-align: center;
    max-width: 280px;
  }
  .audio-badge {
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* Controls bar */
  .controls-bar {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-top: 1px solid var(--border);
  }

  .mode-toggle {
    display: flex;
    background: var(--bg);
    border-radius: 10px;
    padding: 4px;
    border: 1px solid var(--border);
    gap: 4px;
  }
  .mode-btn {
    padding: 8px 16px;
    border-radius: 7px;
    border: none;
    background: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all .2s;
  }
  .mode-btn.active {
    background: var(--card);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .mode-btn.active.audio { color: var(--accent); }

  .bg-indicator {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    opacity: 0;
    transition: opacity .3s;
  }
  .bg-indicator.visible { opacity: 1; }
  .bg-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.5; transform:scale(0.7); }
  }

  /* Video info */
  .video-info {
    padding: 20px 4px 8px;
  }
  .video-title-main {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 20px;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 8px;
  }
  .video-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    color: var(--muted);
    font-size: 13px;
  }
  .channel-name { color: var(--text); font-weight: 500; }

  /* Playlist / sidebar */
  .sidebar {}
  .sidebar-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 16px;
    color: var(--text);
  }

  .playlist {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .playlist-item {
    display: flex;
    gap: 12px;
    padding: 10px;
    border-radius: 12px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all .2s;
    background: var(--surface);
    align-items: flex-start;
  }
  .playlist-item:hover {
    background: var(--card);
    border-color: var(--border);
    transform: translateX(2px);
  }
  .playlist-item.active {
    background: var(--card);
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--glow);
  }

  .thumb-wrap {
    position: relative;
    width: 110px;
    min-width: 110px;
    border-radius: 8px;
    overflow: hidden;
    aspect-ratio: 16/9;
    background: var(--border);
  }
  .thumb-wrap img {
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  .thumb-duration {
    position:absolute;
    bottom:4px; right:4px;
    background: rgba(0,0,0,0.8);
    color:white;
    font-size:11px;
    font-weight:600;
    padding:2px 5px;
    border-radius:4px;
  }

  .item-info { flex:1; min-width:0; }
  .item-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
    margin-bottom:4px;
  }
  .item-channel { font-size:12px; color:var(--muted); }

  /* Floating audio bar */
  .floating-bar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,77,77,0.1);
    backdrop-filter: blur(20px);
    transition: transform .4s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999;
    white-space: nowrap;
  }
  .floating-bar.visible {
    transform: translateX(-50%) translateY(0);
  }
  .float-icon { font-size:18px; }
  .float-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    max-width: 200px;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .float-controls { display:flex; align-items:center; gap:8px; }
  .float-btn {
    width:32px; height:32px;
    border-radius:50%;
    border:none;
    background: var(--border);
    color: var(--text);
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:13px;
    transition: all .2s;
  }
  .float-btn:hover { background:var(--accent); }
  .float-btn.stop { background: rgba(255,77,77,0.15); color:var(--accent); }

  /* Add video section */
  .add-section {
    padding: 20px 0 0;
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }
  .add-label {
    font-size:12px;
    color:var(--muted);
    margin-bottom:8px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    font-weight:600;
  }
  .add-input-row {
    display:flex;
    gap:8px;
  }
  .add-input {
    flex:1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius:10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size:13px;
    outline:none;
    transition: border-color .2s;
  }
  .add-input:focus { border-color:var(--accent); }
  .add-input::placeholder { color:var(--muted); }
  .add-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border:none;
    border-radius:10px;
    padding: 10px 16px;
    color:white;
    font-family:'DM Sans',sans-serif;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
    transition: opacity .2s, transform .1s;
  }
  .add-btn:hover { opacity:0.85; }
  .add-btn:active { transform:scale(0.97); }

  @media(max-width:900px){
    main { grid-template-columns:1fr; }
    .sidebar { order:2; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">▶ TubePlay</div>
  <div class="search-bar">
    <button onclick="searchVideo()">🔍</button>
    <input id="searchInput" type="text" placeholder="Cari video YouTube..." onkeydown="if(event.key==='Enter')searchVideo()">
  </div>
  <div style="font-size:13px;color:var(--muted);">v2.0</div>
</header>

<main>
  <div class="player-section">
    <div class="player-wrap">
      <div class="yt-container" id="ytContainer">
        <!-- YouTube iframe will be created here -->
        <div id="ytPlayer"></div>
        <div class="audio-overlay" id="audioOverlay">
          <div class="vinyl" id="vinyl"></div>
          <div class="audio-badge">🎵 Audio Mode</div>
          <div class="audio-title" id="overlayTitle">Pilih video dari playlist</div>
        </div>
      </div>
      <div class="controls-bar">
        <div class="mode-toggle">
          <button class="mode-btn active" id="btnVideo" onclick="setMode('video')">
            🎬 Video
          </button>
          <button class="mode-btn audio" id="btnAudio" onclick="setMode('audio')">
            🎵 Audio (BG)
          </button>
        </div>
        <div class="bg-indicator" id="bgIndicator">
          <div class="bg-dot"></div>
          <span>Memutar di latar belakang</span>
        </div>
      </div>
    </div>
    <div class="video-info">
      <div class="video-title-main" id="mainTitle">Selamat datang di TubePlay</div>
      <div class="video-meta">
        <span class="channel-name" id="mainChannel">Pilih video untuk mulai</span>
        <span id="mainViews"></span>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-title">📋 Playlist</div>
    <div class="playlist" id="playlist"></div>

    <div class="add-section">
      <div class="add-label">Tambah Video</div>
      <div class="add-input-row">
        <input class="add-input" id="addUrl" type="text" placeholder="Tempel link YouTube...">
        <button class="add-btn" onclick="addVideo()">+ Tambah</button>
      </div>
    </div>
  </div>
</main>

<!-- Floating audio bar (visible when minimized/scrolled) -->
<div class="floating-bar" id="floatingBar">
  <span class="float-icon">🎵</span>
  <span class="float-title" id="floatTitle">Audio sedang diputar</span>
  <div class="float-controls">
    <button class="float-btn" id="floatPlayPause" onclick="togglePlayPause()">⏸</button>
    <button class="float-btn stop" onclick="stopAudio()">✕</button>
  </div>
</div>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player = null;
let currentMode = 'video';
let currentVideoId = null;
let isPlaying = false;

// Default playlist
const defaultPlaylist = [
  { id: 'dQw4w9WgXcQ', title: 'Rick Astley - Never Gonna Give You Up', channel: 'Rick Astley', duration: '3:33' },
  { id: 'kJQP7kiw5Fk', title: 'Luis Fonsi - Despacito ft. Daddy Yankee', channel: 'Luis Fonsi', duration: '4:42' },
  { id: 'JGwWNGJdvx8', title: 'Ed Sheeran - Shape of You', channel: 'Ed Sheeran', duration: '3:53' },
  { id: 'OPf0YbXqDm0', title: 'Mark Ronson - Uptown Funk ft. Bruno Mars', channel: 'Mark Ronson', duration: '4:31' },
  { id: 'RgKAFK5djSk', title: 'Wiz Khalifa - See You Again ft. Charlie Puth', channel: 'WizKhalifaVEVO', duration: '3:50' },
  { id: 'YQHsXMglC9A', title: 'Adele - Hello', channel: 'Adele', duration: '6:07' },
];

let playlist = [...defaultPlaylist];

// YouTube IFrame API ready callback
function onYouTubeIframeAPIReady() {
  player = new YT.Player('ytPlayer', {
    height: '100%',
    width: '100%',
    videoId: playlist[0].id,
    playerVars: {
      autoplay: 0,
      controls: 1,
      rel: 0,
      modestbranding: 1,
      enablejsapi: 1
    },
    events: {
      onReady: onPlayerReady,
      onStateChange: onPlayerStateChange
    }
  });
}

function onPlayerReady(event) {
  currentVideoId = playlist[0].id;
  updateUI(playlist[0]);
  renderPlaylist();
}

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.PLAYING) {
    isPlaying = true;
    document.getElementById('vinyl').classList.add('playing');
    document.getElementById('floatPlayPause').textContent = '⏸';
    if (currentMode === 'audio') showFloatingBar(true);
  } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
    isPlaying = false;
    document.getElementById('vinyl').classList.remove('playing');
    document.getElementById('floatPlayPause').textContent = '▶';
    if (event.data === YT.PlayerState.ENDED) showFloatingBar(false);
  }
}

function loadVideo(item, index) {
  currentVideoId = item.id;
  updateUI(item);

  if (player && player.loadVideoById) {
    player.loadVideoById(item.id);
    // If audio mode, mute the player
    if (currentMode === 'audio') {
      setTimeout(() => {
        player.mute();
        document.getElementById('audioOverlay').querySelector('.audio-title').textContent = item.title;
        document.getElementById('overlayTitle').textContent = item.title;
        document.getElementById('floatTitle').textContent = item.title;
      }, 500);
    }
  }

  // Update active playlist item
  document.querySelectorAll('.playlist-item').forEach((el,i) => {
    el.classList.toggle('active', i === index);
  });
}

function updateUI(item) {
  document.getElementById('mainTitle').textContent = item.title;
  document.getElementById('mainChannel').textContent = item.channel;
  document.getElementById('overlayTitle').textContent = item.title;
  document.getElementById('floatTitle').textContent = item.title;
}

function setMode(mode) {
  currentMode = mode;

  document.getElementById('btnVideo').classList.toggle('active', mode === 'video');
  document.getElementById('btnAudio').classList.toggle('active', mode === 'audio');

  const overlay = document.getElementById('audioOverlay');
  const bgIndicator = document.getElementById('bgIndicator');

  if (mode === 'audio') {
    overlay.classList.add('active');
    bgIndicator.classList.add('visible');
    if (player && player.mute) {
      player.mute();
      // Keep playing even if user switches tab
      if (!isPlaying && player.playVideo) player.playVideo();
    }
    showFloatingBar(true);
  } else {
    overlay.classList.remove('active');
    bgIndicator.classList.remove('visible');
    if (player && player.unMute) player.unMute();
    showFloatingBar(false);
  }
}

function togglePlayPause() {
  if (!player) return;
  if (isPlaying) {
    player.pauseVideo();
  } else {
    player.playVideo();
  }
}

function stopAudio() {
  if (player) player.pauseVideo();
  setMode('video');
  showFloatingBar(false);
}

function showFloatingBar(show) {
  document.getElementById('floatingBar').classList.toggle('visible', show);
}

function renderPlaylist() {
  const container = document.getElementById('playlist');
  container.innerHTML = '';
  playlist.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'playlist-item' + (idx === 0 ? ' active' : '');
    div.innerHTML = `
      <div class="thumb-wrap">
        <img src="https://img.youtube.com/vi/${item.id}/mqdefault.jpg" alt="${item.title}" loading="lazy">
        <span class="thumb-duration">${item.duration}</span>
      </div>
      <div class="item-info">
        <div class="item-title">${item.title}</div>
        <div class="item-channel">${item.channel}</div>
      </div>
    `;
    div.onclick = () => loadVideo(item, idx);
    container.appendChild(div);
  });
}

function extractVideoId(url) {
  const patterns = [
    /(?:v=|\/watch\?v=)([^&\s]+)/,
    /youtu\.be\/([^?\s]+)/,
    /embed\/([^?\s]+)/,
    /^([a-zA-Z0-9_-]{11})$/
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return null;
}

function addVideo() {
  const input = document.getElementById('addUrl');
  const url = input.value.trim();
  if (!url) return;

  const id = extractVideoId(url);
  if (!id) {
    alert('URL YouTube tidak valid. Contoh: https://youtube.com/watch?v=...');
    return;
  }

  const newItem = {
    id,
    title: 'Video baru (' + id + ')',
    channel: 'YouTube',
    duration: '--:--'
  };

  playlist.push(newItem);
  renderPlaylist();
  loadVideo(newItem, playlist.length - 1);
  input.value = '';

  // Scroll to bottom of playlist
  document.getElementById('playlist').lastChild.scrollIntoView({ behavior: 'smooth' });
}

function searchVideo() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  // Open YouTube search in new tab (can't bypass YouTube's restrictions)
  window.open('https://www.youtube.com/results?search_query=' + encodeURIComponent(q), '_blank');
}

// Keep audio alive when tab is hidden (Page Visibility API)
document.addEventListener('visibilitychange', () => {
  if (currentMode === 'audio' && player) {
    if (document.hidden) {
      // Tab hidden — ensure audio keeps playing
      if (!isPlaying) player.playVideo();
    }
  }
});

// Init playlist display right away (before API loads)
renderPlaylist();
</script>
</body>
</html>
