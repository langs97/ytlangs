<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YuTube — Personal Player</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a38;
    --red: #ff2d55;
    --red2: #ff6b6b;
    --text: #f0f0f5;
    --muted: #7a7a9a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px; height: 60px;
    display: flex; align-items: center; gap: 16px;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; color: var(--red);
    letter-spacing: 2px; cursor: pointer; white-space: nowrap;
  }
  .logo span { color: var(--text); }
  .search-wrap { flex: 1; max-width: 560px; display: flex; }
  .search-wrap input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-right: none;
    border-radius: 10px 0 0 10px;
    padding: 9px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--red); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap button {
    background: var(--red); border: none;
    border-radius: 0 10px 10px 0;
    padding: 9px 18px; color: white;
    cursor: pointer; font-size: 15px;
    transition: background 0.2s;
  }
  .search-wrap button:hover { background: var(--red2); }

  main { max-width: 1300px; margin: 0 auto; padding: 20px; }

  #home-page { display: block; }
  #player-page { display: none; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--red);
    box-shadow: 0 8px 28px rgba(255,45,85,0.15);
  }
  .card-thumb {
    position: relative; aspect-ratio: 16/9;
    overflow: hidden; background: var(--surface2);
  }
  .card-thumb img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.3s;
  }
  .card:hover .card-thumb img { transform: scale(1.05); }
  .card-duration {
    position: absolute; bottom: 6px; right: 6px;
    background: rgba(0,0,0,0.85); color: white;
    font-size: 11px; font-weight: 600;
    padding: 2px 6px; border-radius: 5px;
  }
  .play-overlay {
    position: absolute; inset: 0;
    background: rgba(255,45,85,0);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: all 0.2s;
  }
  .card:hover .play-overlay { opacity: 1; background: rgba(255,45,85,0.12); }
  .card-info { padding: 12px; }
  .card-title {
    font-size: 13px; font-weight: 600; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
    margin-bottom: 5px;
  }
  .card-meta { font-size: 11px; color: var(--muted); }

  /* Player */
  .player-layout {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 20px;
  }
  @media (max-width: 860px) { .player-layout { grid-template-columns: 1fr; } }

  .embed-wrap {
    border-radius: 14px; overflow: hidden;
    aspect-ratio: 16/9; background: #000;
    position: relative;
  }
  .embed-wrap iframe {
    width: 100%; height: 100%; border: none;
  }

  .video-info { margin-top: 16px; }
  .video-title { font-size: 18px; font-weight: 600; line-height: 1.3; margin-bottom: 8px; }
  .video-uploader { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

  .download-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 16px;
    margin-top: 4px;
  }
  .download-box h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px; letter-spacing: 1px;
    color: var(--muted); margin-bottom: 12px;
  }
  .dl-group { margin-bottom: 12px; }
  .dl-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
  .dl-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
  .dl-btn {
    padding: 7px 14px; border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    text-decoration: none; display: inline-flex;
    align-items: center; gap: 5px;
  }
  .dl-btn:hover { border-color: var(--red); color: var(--red); background: rgba(255,45,85,0.08); }
  .dl-btn.audio { border-color: #6d28d9; color: #a78bfa; }
  .dl-btn.audio:hover { background: rgba(109,40,217,0.1); }
  .dl-btn.loading { opacity: 0.6; pointer-events: none; }

  /* Sidebar */
  .sidebar-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px; letter-spacing: 1px;
    color: var(--muted); margin-bottom: 12px;
  }
  .related-list { display: flex; flex-direction: column; gap: 10px; }
  .related-card {
    display: flex; gap: 10px; cursor: pointer;
    padding: 8px; border-radius: 10px;
    border: 1px solid transparent; transition: all 0.2s;
  }
  .related-card:hover { background: var(--surface); border-color: var(--border); }
  .related-thumb {
    width: 110px; min-width: 110px;
    aspect-ratio: 16/9; border-radius: 7px;
    overflow: hidden; background: var(--surface2);
  }
  .related-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .related-info { flex: 1; overflow: hidden; }
  .related-title {
    font-size: 12px; font-weight: 500; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 3px;
  }
  .related-meta { font-size: 11px; color: var(--muted); }

  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--muted); cursor: pointer; font-size: 13px;
    margin-bottom: 16px; background: none; border: none;
    font-family: 'DM Sans', sans-serif; transition: color 0.2s;
  }
  .back-btn:hover { color: var(--text); }

  .empty-state {
    text-align: center; padding: 80px 20px; color: var(--muted);
  }
  .empty-state .big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px; color: var(--border);
    line-height: 1; margin-bottom: 12px;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 60px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px;
    border-radius: 10px; font-size: 13px;
    transition: transform 0.3s; z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo" onclick="goHome()">YU<span>TUBE</span></div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Cari video YouTube..." onkeydown="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()">🔍</button>
  </div>
</header>

<main>
  <div id="home-page">
    <div id="home-content">
      <div class="empty-state">
        <div class="big">▶</div>
        <div style="font-size:17px;font-weight:600;margin-bottom:8px;">YuTube Personal Player</div>
        <div style="font-size:13px;">Tonton YouTube tanpa iklan. Cari video di atas untuk mulai.</div>
      </div>
    </div>
  </div>

  <div id="player-page">
    <button class="back-btn" onclick="goHome()">← Kembali</button>
    <div class="player-layout">
      <div>
        <div class="embed-wrap">
          <iframe id="ytEmbed" allowfullscreen
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            src="">
          </iframe>
        </div>
        <div class="video-info">
          <div class="video-title" id="videoTitle">—</div>
          <div class="video-uploader" id="videoUploader">—</div>
          <div class="download-box">
            <h3>⬇ Download</h3>
            <div class="dl-group">
              <div class="dl-label">Video</div>
              <div class="dl-buttons" id="dlVideo">
                <span style="color:var(--muted);font-size:12px;">Memuat...</span>
              </div>
            </div>
            <div class="dl-group">
              <div class="dl-label">Audio</div>
              <div class="dl-buttons" id="dlAudio">
                <span style="color:var(--muted);font-size:12px;">Memuat...</span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="sidebar">
        <div class="sidebar-title">Video Terkait</div>
        <div class="related-list" id="relatedList">
          <div style="color:var(--muted);font-size:13px;">—</div>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  let currentId = null;

  function formatDur(s) {
    if (!s) return "";
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
    if (h > 0) return h+":"+String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");
    return m+":"+String(sec).padStart(2,"0");
  }

  function formatViews(n) {
    if (!n) return "";
    if (n >= 1e6) return (n/1e6).toFixed(1)+"M";
    if (n >= 1e3) return Math.floor(n/1e3)+"K";
    return n;
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 3000);
  }

  async function doSearch() {
    const q = document.getElementById("searchInput").value.trim();
    if (!q) return;

    document.getElementById("home-page").style.display = "block";
    document.getElementById("player-page").style.display = "none";
    document.getElementById("home-content").innerHTML = '<div class="spinner"></div>';

    try {
      const res = await fetch("/api/search?q=" + encodeURIComponent(q));
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      if (!data.results.length) {
        document.getElementById("home-content").innerHTML = '<div class="empty-state">Tidak ada hasil untuk "<b>' + q + '</b>"</div>';
        return;
      }
      let html = '<div class="grid">';
      data.results.forEach(v => {
        html += `
          <div class="card" onclick="playVideo('${v.id}','${(v.title||'').replace(/'/g,"\\'")}','${(v.uploader||'').replace(/'/g,"\\'")}')">
            <div class="card-thumb">
              <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" loading="lazy">
              <div class="play-overlay">
                <svg width="44" height="44" viewBox="0 0 44 44">
                  <circle cx="22" cy="22" r="22" fill="rgba(255,45,85,0.9)"/>
                  <path d="M17 14l16 8-16 8V14z" fill="white"/>
                </svg>
              </div>
              ${v.duration ? '<div class="card-duration">'+formatDur(v.duration)+'</div>' : ''}
            </div>
            <div class="card-info">
              <div class="card-title">${v.title||''}</div>
              <div class="card-meta">${v.uploader||''} ${v.view_count ? '· '+formatViews(v.view_count)+' views' : ''}</div>
            </div>
          </div>`;
      });
      html += '</div>';
      document.getElementById("home-content").innerHTML = html;
    } catch(e) {
      document.getElementById("home-content").innerHTML = '<div class="empty-state">Error: ' + e.message + '</div>';
    }
  }

  function playVideo(id, title, uploader) {
    currentId = id;
    document.getElementById("home-page").style.display = "none";
    document.getElementById("player-page").style.display = "block";
    window.scrollTo(0, 0);

    // Embed YouTube tanpa iklan, autoplay
    document.getElementById("ytEmbed").src =
      "https://www.youtube.com/embed/" + id +
      "?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3";

    document.getElementById("videoTitle").textContent = title || "Memuat...";
    document.getElementById("videoUploader").textContent = uploader || "";
    document.getElementById("dlVideo").innerHTML = '<span style="color:var(--muted);font-size:12px;">Memuat...</span>';
    document.getElementById("dlAudio").innerHTML = '<span style="color:var(--muted);font-size:12px;">Memuat...</span>';
    document.getElementById("relatedList").innerHTML = '<div style="color:var(--muted);font-size:12px;">Memuat...</div>';

    // Load download links & info
    loadDownloadLinks(id);
    loadRelated(title || "");
  }

  async function loadDownloadLinks(id) {
    try {
      // Video download buttons
      const dlVideoDiv = document.getElementById("dlVideo");
      dlVideoDiv.innerHTML = "";
      ["360", "480", "720"].forEach(q => {
        const a = document.createElement("a");
        a.href = "/api/download?id=" + id + "&mode=video&q=" + q;
        a.className = "dl-btn";
        a.innerHTML = "⬇ " + q + "p";
        a.addEventListener("click", () => showToast("Memulai download " + q + "p..."));
        dlVideoDiv.appendChild(a);
      });

      // Audio download button
      const dlAudioDiv = document.getElementById("dlAudio");
      dlAudioDiv.innerHTML = "";
      const audioBtn = document.createElement("a");
      audioBtn.href = "/api/download?id=" + id + "&mode=audio";
      audioBtn.className = "dl-btn audio";
      audioBtn.innerHTML = "🎵 Audio (M4A)";
      audioBtn.addEventListener("click", () => showToast("Memulai download audio..."));
      dlAudioDiv.appendChild(audioBtn);

    } catch(e) {
      document.getElementById("dlVideo").innerHTML = '<span style="color:var(--muted)">Gagal load</span>';
    }
  }

  async function loadRelated(title) {
    try {
      const keyword = title.split(" ").slice(0, 4).join(" ");
      const res = await fetch("/api/search?q=" + encodeURIComponent(keyword));
      const data = await res.json();
      const list = document.getElementById("relatedList");
      list.innerHTML = "";
      (data.results || []).filter(v => v.id !== currentId).slice(0, 8).forEach(v => {
        const div = document.createElement("div");
        div.className = "related-card";
        div.onclick = () => playVideo(v.id, v.title, v.uploader);
        div.innerHTML = `
          <div class="related-thumb">
            <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" loading="lazy">
          </div>
          <div class="related-info">
            <div class="related-title">${v.title||''}</div>
            <div class="related-meta">${v.uploader||''} · ${formatDur(v.duration)}</div>
          </div>`;
        list.appendChild(div);
      });
    } catch(e) {}
  }

  function goHome() {
    document.getElementById("home-page").style.display = "block";
    document.getElementById("player-page").style.display = "none";
    document.getElementById("ytEmbed").src = "";
  }
</script>
</body>
  </html>
