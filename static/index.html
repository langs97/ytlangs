<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YuTube</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:#2a2a38;--red:#ff2d55;--red2:#ff6b6b;--text:#f0f0f5;--muted:#7a7a9a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:140px;}
header{position:sticky;top:0;z-index:200;background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 16px;height:58px;display:flex;align-items:center;gap:12px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--red);letter-spacing:2px;cursor:pointer;white-space:nowrap;}
.logo span{color:var(--text);}
.search-wrap{flex:1;max-width:520px;display:flex;}
.search-wrap input{flex:1;background:var(--surface2);border:1px solid var(--border);border-right:none;border-radius:9px 0 0 9px;padding:8px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;}
.search-wrap input:focus{border-color:var(--red);}
.search-wrap input::placeholder{color:var(--muted);}
.search-wrap button{background:var(--red);border:none;border-radius:0 9px 9px 0;padding:8px 14px;color:white;cursor:pointer;font-size:15px;}
.nav-tabs{display:flex;gap:2px;padding:0 16px;border-bottom:1px solid var(--border);background:var(--bg);overflow-x:auto;}
.nav-tab{padding:9px 14px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--red);border-bottom-color:var(--red);}
main{max-width:1400px;margin:0 auto;padding:16px;}
.page{display:none;}.page.active{display:block;}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--muted);margin-bottom:14px;}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:28px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;}
.card:hover{transform:translateY(-3px);border-color:var(--red);box-shadow:0 6px 22px rgba(255,45,85,0.15);}
.card-thumb{position:relative;aspect-ratio:16/9;overflow:hidden;background:var(--surface2);}
.card-thumb img{width:100%;height:100%;object-fit:cover;transition:transform 0.3s;}
.card:hover .card-thumb img{transform:scale(1.05);}
.card-duration{position:absolute;bottom:5px;right:5px;background:rgba(0,0,0,0.85);color:white;font-size:11px;font-weight:600;padding:2px 5px;border-radius:4px;}
.play-ov{position:absolute;inset:0;background:rgba(255,45,85,0);display:flex;align-items:center;justify-content:center;opacity:0;transition:all 0.2s;}
.card:hover .play-ov{opacity:1;background:rgba(255,45,85,0.12);}
.card-info{padding:10px 11px;}
.card-title{font-size:12px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px;}
.card-meta{font-size:11px;color:var(--muted);}

/* Player layout */
.player-layout{display:grid;grid-template-columns:1fr 360px;gap:18px;}
@media(max-width:900px){.player-layout{grid-template-columns:1fr;}}

.embed-wrap{border-radius:12px;overflow:hidden;aspect-ratio:16/9;background:#000;}
#ytEmbed{width:100%;height:100%;border:none;display:block;}

/* Audio player */
.audio-player{border-radius:12px;overflow:hidden;background:var(--surface);border:1px solid var(--border);display:none;}
.audio-thumb-wrap{position:relative;aspect-ratio:16/9;background:var(--surface2);overflow:hidden;}
.audio-thumb-wrap img{width:100%;height:100%;object-fit:cover;}
.audio-thumb-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:72px;background:linear-gradient(135deg,#1c1c26,#0a0a0f);}
.audio-body{padding:16px;}
.audio-ttl{font-size:15px;font-weight:600;margin-bottom:3px;line-height:1.3;}
.audio-upl{font-size:12px;color:var(--muted);margin-bottom:10px;}
.audio-stat{font-size:12px;color:var(--muted);margin-bottom:10px;min-height:16px;}

/* Controls — BIGGER */
.ctrl-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:14px;}
.ctrl-btn{background:none;border:none;color:var(--text);cursor:pointer;font-size:28px;padding:6px;transition:all 0.2s;line-height:1;}
.ctrl-btn:hover{color:var(--red);transform:scale(1.1);}
.ctrl-btn.pp{background:var(--red);border-radius:50%;width:56px;height:56px;display:flex;align-items:center;justify-content:center;font-size:22px;color:white;flex-shrink:0;}
.ctrl-btn.pp:hover{background:var(--red2);transform:scale(1.05);}

.prog-wrap{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.prog-bar{flex:1;height:5px;background:var(--border);border-radius:3px;cursor:pointer;position:relative;}
.prog-bar:hover{height:7px;}
.prog-fill{height:100%;background:var(--red);border-radius:3px;width:0%;pointer-events:none;transition:width 0.3s linear;}
.time-lbl{font-size:11px;color:var(--muted);white-space:nowrap;min-width:80px;text-align:right;}
.vol-row{display:flex;align-items:center;gap:8px;font-size:14px;}
.vol-row input{flex:1;accent-color:var(--red);}

.mode-toggle{display:flex;margin-bottom:14px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;overflow:hidden;width:fit-content;}
.mode-btn{padding:7px 20px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.mode-btn.active{background:var(--red);color:white;}

.video-info{margin-top:12px;}
.video-title{font-size:16px;font-weight:600;line-height:1.3;margin-bottom:5px;}
.video-uploader{font-size:12px;color:var(--muted);margin-bottom:12px;}
.dl-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;}
.dl-box h3{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;color:var(--muted);margin-bottom:9px;}
.dl-grp{margin-bottom:9px;}
.dl-lbl{font-size:10px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px;}
.dl-btns{display:flex;flex-wrap:wrap;gap:6px;}
.dl-btn{padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
.dl-btn:hover{border-color:var(--red);color:var(--red);background:rgba(255,45,85,0.08);}
.dl-btn.adl{border-color:#6d28d9;color:#a78bfa;}
.dl-btn.adl:hover{background:rgba(109,40,217,0.1);}

/* Sidebar — lebih banyak */
.sidebar{max-height:85vh;overflow-y:auto;}
.sidebar-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;color:var(--muted);margin-bottom:9px;position:sticky;top:0;background:var(--bg);padding:4px 0;z-index:1;}
.related-list{display:flex;flex-direction:column;gap:6px;}
.related-card{display:flex;gap:8px;cursor:pointer;padding:7px;border-radius:8px;border:1px solid transparent;transition:all 0.2s;}
.related-card:hover{background:var(--surface);border-color:var(--border);}
.related-card.next-up{border-color:var(--red)!important;background:rgba(255,45,85,0.06);}
.related-thumb{width:110px;min-width:110px;aspect-ratio:16/9;border-radius:6px;overflow:hidden;background:var(--surface2);}
.related-thumb img{width:100%;height:100%;object-fit:cover;}
.related-info{flex:1;overflow:hidden;}
.related-title{font-size:12px;font-weight:500;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:2px;}
.related-meta{font-size:10px;color:var(--muted);}

.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--muted);cursor:pointer;font-size:13px;margin-bottom:12px;background:none;border:none;font-family:'DM Sans',sans-serif;transition:color 0.2s;}
.back-btn:hover{color:var(--text);}

/* MINI PLAYER */
#miniPlayer{position:fixed;bottom:0;left:0;right:0;z-index:999;background:var(--surface);border-top:2px solid var(--red);display:none;}
#miniPlayer.show{display:block;}
.mini-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;}
.mini-thumb-img{width:60px;height:40px;border-radius:6px;object-fit:cover;background:var(--surface2);cursor:pointer;flex-shrink:0;}
.mini-info{flex:1;overflow:hidden;cursor:pointer;}
.mini-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mini-up{font-size:11px;color:var(--muted);}
.mini-ctrl{display:flex;align-items:center;gap:2px;}
.mini-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;padding:5px 8px;border-radius:5px;transition:color 0.2s;}
.mini-btn:hover{color:var(--text);}
.mini-prog-wrap{padding:0 14px 7px;display:none;align-items:center;gap:8px;}
.mini-prog-wrap.show{display:flex;}
.mini-prog{flex:1;height:3px;background:var(--border);border-radius:2px;cursor:pointer;}
.mini-prog-fill{height:100%;background:var(--red);border-radius:2px;width:0%;}
.mini-time{font-size:10px;color:var(--muted);}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state .big{font-family:'Bebas Neue',sans-serif;font-size:60px;color:var(--border);line-height:1;margin-bottom:10px;}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite;margin:50px auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-more{display:block;width:100%;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s;margin-top:8px;}
.load-more:hover{border-color:var(--red);color:var(--red);}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;font-size:12px;transition:transform 0.3s;z-index:9999;}
.toast.show{transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<header>
  <div class="logo" onclick="showPage('home')">YU<span>TUBE</span></div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Cari video atau lagu..." onkeydown="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()">🔍</button>
  </div>
</header>
<div class="nav-tabs">
  <div class="nav-tab active" id="tab-home" onclick="showPage('home')">🏠 Beranda</div>
  <div class="nav-tab" id="tab-history" onclick="showPage('history')">🕐 Riwayat</div>
  <div class="nav-tab" id="tab-search" style="display:none" onclick="showPage('search')">🔍 Pencarian</div>
</div>
<main>
  <div class="page active" id="page-home">
    <div class="section-title">✨ FOR YOU</div>
    <div id="homeGrid"><div class="spinner"></div></div>
  </div>
  <div class="page" id="page-search">
    <div class="section-title" id="searchLabel">HASIL PENCARIAN</div>
    <div id="searchGrid"></div>
  </div>
  <div class="page" id="page-history">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div class="section-title" style="margin:0">🕐 RIWAYAT</div>
      <button onclick="clearHistory()" style="background:none;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:7px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;">Hapus Semua</button>
    </div>
    <div id="historyGrid"></div>
  </div>
  <div class="page" id="page-player">
    <button class="back-btn" onclick="goBack()">← Kembali</button>
    <div class="mode-toggle">
      <button class="mode-btn active" id="modeVideo" onclick="switchMode('video')">🎬 Video</button>
      <button class="mode-btn" id="modeAudio" onclick="switchMode('audio')">🎵 Audio</button>
    </div>
    <div class="player-layout">
      <div>
        <div class="embed-wrap" id="embedWrap"><div id="ytEmbed"></div></div>
        <div class="audio-player" id="audioPlayer">
          <div class="audio-thumb-wrap">
            <div class="audio-thumb-ph" id="audioThumbPh">🎵</div>
            <img id="audioThumb" src="" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;">
          </div>
          <div class="audio-body">
            <div class="audio-ttl" id="audioTtl">—</div>
            <div class="audio-upl" id="audioUpl">—</div>
            <div class="audio-stat" id="audioStat">⏳ Memuat audio...</div>
            <div class="ctrl-row">
              <button class="ctrl-btn" onclick="playPrevious()" title="Sebelumnya">⏮</button>
              <button class="ctrl-btn" onclick="seekAudio(-10)" title="-10 detik">⏪</button>
              <button class="ctrl-btn pp" id="ppBtn" onclick="togglePlay()">▶</button>
              <button class="ctrl-btn" onclick="seekAudio(10)" title="+10 detik">⏩</button>
              <button class="ctrl-btn" onclick="playNext()" title="Selanjutnya">⏭</button>
            </div>
            <div class="prog-wrap">
              <div class="prog-bar" id="progBar" onclick="seekClick(event,this)"><div class="prog-fill" id="progFill"></div></div>
              <div class="time-lbl" id="timeLbl">0:00 / 0:00</div>
            </div>
            <div class="vol-row">🔊<input type="range" min="0" max="1" step="0.05" value="1" oninput="audioEl.volume=this.value"></div>
          </div>
        </div>
        <div class="video-info">
          <div class="video-title" id="videoTitle">—</div>
          <div class="video-uploader" id="videoUploader">—</div>
          <div class="dl-box">
            <h3>⬇ Download</h3>
            <div class="dl-grp"><div class="dl-lbl">Video MP4</div><div class="dl-btns" id="dlVideo"></div></div>
            <div class="dl-grp"><div class="dl-lbl">Audio</div><div class="dl-btns" id="dlAudio"></div></div>
          </div>
        </div>
      </div>
      <div class="sidebar">
        <div class="sidebar-title">▶ Selanjutnya</div>
        <div class="related-list" id="relatedList"><div style="color:var(--muted);font-size:12px;">Memuat...</div></div>
      </div>
    </div>
  </div>
</main>

<!-- MINI PLAYER -->
<div id="miniPlayer">
  <div class="mini-bar">
    <img class="mini-thumb-img" id="miniThumb" src="" onclick="expandPlayer()">
    <div class="mini-info" onclick="expandPlayer()">
      <div class="mini-title" id="miniTitle">—</div>
      <div class="mini-up" id="miniUp">—</div>
    </div>
    <div class="mini-ctrl">
      <button class="mini-btn" id="miniPrevBtn" onclick="playPrevious()" style="display:none">⏮</button>
      <button class="mini-btn" id="miniPPBtn" onclick="togglePlay()" style="display:none">▶</button>
      <button class="mini-btn" id="miniNextBtn" onclick="playNext()" style="display:none">⏭</button>
      <button class="mini-btn" onclick="expandPlayer()">⤢</button>
      <button class="mini-btn" onclick="closeMini()">✕</button>
    </div>
  </div>
  <div class="mini-prog-wrap" id="miniProgWrap">
    <div class="mini-prog" onclick="seekClick(event,this)"><div class="mini-prog-fill" id="miniProgFill"></div></div>
    <div class="mini-time" id="miniTime">0:00</div>
  </div>
</div>

<audio id="audioEl" preload="auto"></audio>
<div class="toast" id="toast"></div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ─── State ────────────────────────────────────────────────────────────────────
let currentVideo = null;
let prevPage = 'home';
let currentMode = 'video';
let miniActive = false;
let relatedVideos = [];
let relatedIndex = 0; // index video yang sedang diputar di queue
let historyQueue = []; // riwayat dalam sesi untuk tombol "sebelumnya"
let audioCache = {};
const audioEl = document.getElementById('audioEl');
let ytPlayer = null;
let ytReady = false;
let ytPendingId = null;

// ─── YouTube IFrame API ───────────────────────────────────────────────────────
function onYouTubeIframeAPIReady(){
  ytReady = true;
  ytPlayer = new YT.Player('ytEmbed',{
    height:'100%', width:'100%',
    playerVars:{autoplay:1,rel:0,modestbranding:1,iv_load_policy:3},
    events:{
      onReady:()=>{ if(ytPendingId) loadYT(ytPendingId); },
      onStateChange:(e)=>{
        if(e.data===YT.PlayerState.ENDED && currentMode==='video'){
          playNext();
        }
      }
    }
  });
}

function loadYT(id){
  if(!ytReady||!ytPlayer){ytPendingId=id;return;}
  ytPendingId=null;
  ytPlayer.loadVideoById(id);
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function fmt(s){if(!s)return"0:00";const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);if(h>0)return h+":"+String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");return m+":"+String(sec).padStart(2,"0");}
function fmtV(n){if(!n)return"";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return Math.floor(n/1e3)+"K";return n;}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3000);}

// ─── History (PERSISTENT - tidak hilang saat update) ─────────────────────────
const HIST_KEY = "ytube_history_v1"; // key unik agar tidak konflik
function getHist(){try{return JSON.parse(localStorage.getItem(HIST_KEY)||"[]");}catch{return[];}}
function addHist(v){let h=getHist().filter(x=>x.id!==v.id);h.unshift({id:v.id,title:v.title,uploader:v.uploader,duration:v.duration||0,view_count:v.view_count||0});if(h.length>100)h=h.slice(0,100);localStorage.setItem(HIST_KEY,JSON.stringify(h));}
function clearHistory(){localStorage.removeItem(HIST_KEY);renderHistory();toast("Riwayat dihapus");}

// ─── Pages ───────────────────────────────────────────────────────────────────
function showPage(name){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".nav-tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("page-"+name).classList.add("active");
  const tab=document.getElementById("tab-"+name);
  if(tab)tab.classList.add("active");
  if(name==="history")renderHistory();
  if(name==="home"&&document.getElementById("homeGrid").children.length<=1)loadHome();
}

function goBack(){
  if(currentVideo) activateMini();
  showPage(prevPage==="player"?"home":prevPage);
}

// ─── Mini Player ─────────────────────────────────────────────────────────────
function activateMini(){
  if(!currentVideo) return;
  miniActive=true;
  document.getElementById("miniThumb").src="https://img.youtube.com/vi/"+currentVideo.id+"/mqdefault.jpg";
  document.getElementById("miniTitle").textContent=currentVideo.title;
  document.getElementById("miniUp").textContent=currentVideo.uploader||"";
  document.getElementById("miniPlayer").classList.add("show");
  const isAudio=currentMode==="audio";
  ["miniPPBtn","miniPrevBtn","miniNextBtn"].forEach(id=>{
    document.getElementById(id).style.display=isAudio?"flex":"none";
  });
  document.getElementById("miniProgWrap").classList.toggle("show",isAudio);
}

function expandPlayer(){
  miniActive=false;
  document.getElementById("miniPlayer").classList.remove("show");
  showPage("player");
  window.scrollTo(0,0);
}

function closeMini(){
  miniActive=false;
  document.getElementById("miniPlayer").classList.remove("show");
  audioEl.pause(); audioEl.src="";
  if(ytPlayer) ytPlayer.stopVideo();
  currentVideo=null; relatedVideos=[]; historyQueue=[];
}

// ─── Next / Previous ─────────────────────────────────────────────────────────
function playNext(){
  if(!relatedVideos.length) return;
  relatedIndex = Math.min(relatedIndex+1, relatedVideos.length-1);
  const next=relatedVideos[relatedIndex];
  if(!next) return;
  toast("▶ "+next.title.slice(0,50));
  playVideo(next.id, next.title, next.uploader, next.duration, next.view_count);
}

function playPrevious(){
  if(historyQueue.length < 2) return;
  historyQueue.pop(); // buang current
  const prev=historyQueue[historyQueue.length-1];
  if(!prev) return;
  toast("⏮ "+prev.title.slice(0,50));
  // Play tanpa push ke history lagi
  _playVideoInternal(prev.id, prev.title, prev.uploader, prev.duration, prev.view_count, false);
}

// Audio ended → next
audioEl.addEventListener("ended",()=>{
  if(currentMode==="audio") playNext();
});

// ─── Audio ────────────────────────────────────────────────────────────────────
async function fetchAudio(id){
  if(audioCache[id]) return audioCache[id];
  const res=await fetch("/api/audio_url?id="+id);
  const data=await res.json();
  if(data.error) throw new Error(data.error);
  audioCache[id]=data.url;
  return data.url;
}

async function loadAudio(id, info){
  document.getElementById("audioStat").textContent="⏳ Memuat audio...";
  document.getElementById("ppBtn").textContent="▶";

  // Set info
  if(info){
    document.getElementById("audioTtl").textContent=info.title||"";
    document.getElementById("audioUpl").textContent=info.uploader||"";
  }

  // Thumbnail
  const thumbEl=document.getElementById("audioThumb");
  const thumbPh=document.getElementById("audioThumbPh");
  thumbEl.style.display="none"; thumbPh.style.display="flex";
  const tryThumb=(url)=>new Promise(r=>{const i=new Image();i.onload=()=>r(true);i.onerror=()=>r(false);i.src=url;});
  const hdOk=await tryThumb("https://img.youtube.com/vi/"+id+"/maxresdefault.jpg");
  thumbEl.src=hdOk?"https://img.youtube.com/vi/"+id+"/maxresdefault.jpg":"https://img.youtube.com/vi/"+id+"/mqdefault.jpg";
  thumbEl.style.display="block"; thumbPh.style.display="none";

  try{
    const url=await fetchAudio(id);
    audioEl.src=url; audioEl.load();
    const p=audioEl.play(); if(p) p.catch(()=>{});
    document.getElementById("audioStat").textContent="";
    // Prefetch audio berikutnya
    if(relatedVideos[relatedIndex+1]) fetchAudio(relatedVideos[relatedIndex+1].id).catch(()=>{});
  }catch(e){
    document.getElementById("audioStat").textContent="❌ Gagal: "+e.message;
  }
}

function prefetch(id){ if(!audioCache[id]) fetchAudio(id).catch(()=>{}); }

function togglePlay(){
  if(audioEl.paused) audioEl.play(); else audioEl.pause();
}
function seekAudio(s){audioEl.currentTime=Math.max(0,audioEl.currentTime+s);}
function seekClick(e,bar){
  const rect=bar.getBoundingClientRect();
  const r=(e.clientX-rect.left)/rect.width;
  if(audioEl.duration) audioEl.currentTime=Math.max(0,Math.min(r*audioEl.duration,audioEl.duration));
}

audioEl.addEventListener("timeupdate",()=>{
  if(!audioEl.duration||isNaN(audioEl.duration)) return;
  const pct=(audioEl.currentTime/audioEl.duration*100).toFixed(2)+"%";
  document.getElementById("progFill").style.width=pct;
  document.getElementById("miniProgFill").style.width=pct;
  document.getElementById("timeLbl").textContent=fmt(audioEl.currentTime)+" / "+fmt(audioEl.duration);
  document.getElementById("miniTime").textContent=fmt(audioEl.currentTime);
});
audioEl.addEventListener("play",()=>{document.getElementById("ppBtn").textContent="⏸";document.getElementById("miniPPBtn").textContent="⏸";});
audioEl.addEventListener("pause",()=>{document.getElementById("ppBtn").textContent="▶";document.getElementById("miniPPBtn").textContent="▶";});

// ─── Mode switch ─────────────────────────────────────────────────────────────
function switchMode(mode){
  if(!currentVideo||currentMode===mode) return;
  currentMode=mode;
  document.getElementById("modeVideo").classList.toggle("active",mode==="video");
  document.getElementById("modeAudio").classList.toggle("active",mode==="audio");
  document.getElementById("embedWrap").style.display=mode==="video"?"block":"none";
  document.getElementById("audioPlayer").style.display=mode==="audio"?"block":"none";
  if(mode==="video"){
    audioEl.pause();
    loadYT(currentVideo.id);
  } else {
    if(ytPlayer) ytPlayer.pauseVideo();
    loadAudio(currentVideo.id, currentVideo);
  }
  // Update mini player
  if(miniActive) activateMini();
}

// ─── Card HTML ────────────────────────────────────────────────────────────────
function cardHTML(v){
  const t=(v.title||"").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  const u=(v.uploader||"").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  return`<div class="card" onclick="playVideo('${v.id}','${t}','${u}',${v.duration||0},${v.view_count||0})">
    <div class="card-thumb">
      <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" loading="lazy" onerror="this.src='https://img.youtube.com/vi/${v.id}/default.jpg'">
      <div class="play-ov"><svg width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="20" fill="rgba(255,45,85,0.9)"/><path d="M15 11l14 9-14 9V11z" fill="white"/></svg></div>
      ${v.duration?'<div class="card-duration">'+fmt(v.duration)+'</div>':''}
    </div>
    <div class="card-info">
      <div class="card-title">${v.title||''}</div>
      <div class="card-meta">${v.uploader||''} ${v.view_count?'· '+fmtV(v.view_count):''}</div>
    </div>
  </div>`;
}

// ─── Home FYP ─────────────────────────────────────────────────────────────────
async function loadHome(){
  const grid=document.getElementById("homeGrid");
  grid.innerHTML='<div class="spinner"></div>';

  // Cek riwayat untuk personalisasi
  const h=getHist();
  let extra=[];
  if(h.length>0){
    // Ambil berdasarkan riwayat juga
    try{
      const kw=h[0].title.split(" ").slice(0,3).join(" ");
      const r=await fetch("/api/search?q="+encodeURIComponent(kw)+"&limit=10");
      const d=await r.json();
      if(d.results) extra=d.results;
    }catch{}
  }

  try{
    const res=await fetch("/api/fyp");
    const data=await res.json();
    let results=[...extra,...(data.results||[])];
    // Dedupe
    const seen=new Set();
    results=results.filter(v=>{if(seen.has(v.id))return false;seen.add(v.id);return true;});
    if(!results.length) throw new Error();
    let html='<div class="grid">'+results.map(cardHTML).join("")+'</div>';
    grid.innerHTML=html;
  }catch{
    grid.innerHTML='<div class="empty-state"><div class="big">▶</div><div>Cari video untuk mulai</div></div>';
  }
}

// ─── Search ───────────────────────────────────────────────────────────────────
async function doSearch(){
  const q=document.getElementById("searchInput").value.trim();
  if(!q) return;
  if(document.getElementById("page-player").classList.contains("active")&&currentVideo){
    activateMini();
  }
  prevPage="search";
  document.getElementById("tab-search").style.display="flex";
  document.getElementById("searchLabel").textContent='HASIL: "'+q+'" (20 video)';
  document.getElementById("searchGrid").innerHTML='<div class="spinner"></div>';
  showPage("search");
  try{
    const res=await fetch("/api/search?q="+encodeURIComponent(q)+"&limit=20");
    const data=await res.json();
    if(!data.results?.length){document.getElementById("searchGrid").innerHTML='<div class="empty-state">Tidak ada hasil</div>';return;}
    document.getElementById("searchGrid").innerHTML='<div class="grid">'+data.results.map(cardHTML).join("")+'</div>';
  }catch(e){document.getElementById("searchGrid").innerHTML='<div class="empty-state">Error: '+e.message+'</div>';}
}

// ─── History ─────────────────────────────────────────────────────────────────
function renderHistory(){
  const h=getHist();
  const grid=document.getElementById("historyGrid");
  if(!h.length){grid.innerHTML='<div class="empty-state"><div class="big">🕐</div><div>Belum ada riwayat</div></div>';return;}
  grid.innerHTML='<div class="grid">'+h.map(cardHTML).join("")+'</div>';
}

// ─── Play Video ───────────────────────────────────────────────────────────────
function playVideo(id, title, uploader, duration, view_count){
  _playVideoInternal(id, title, uploader, duration, view_count, true);
}

function _playVideoInternal(id, title, uploader, duration, view_count, pushHistory){
  if(miniActive){
    document.getElementById("miniPlayer").classList.remove("show");
    miniActive=false;
  }
  audioEl.pause();
  if(ytPlayer&&currentMode==="video") ytPlayer.stopVideo();

  const modeToUse=currentMode;
  currentVideo={id,title,uploader,duration,view_count};

  if(pushHistory){
    addHist(currentVideo);
    historyQueue.push(currentVideo);
    if(historyQueue.length>50) historyQueue.shift();
  }

  const ap=document.querySelector(".page.active");
  if(ap&&ap.id!=="page-player") prevPage=ap.id.replace("page-","");

  showPage("player");
  window.scrollTo(0,0);

  document.getElementById("modeVideo").classList.toggle("active",modeToUse==="video");
  document.getElementById("modeAudio").classList.toggle("active",modeToUse==="audio");
  document.getElementById("embedWrap").style.display=modeToUse==="video"?"block":"none";
  document.getElementById("audioPlayer").style.display=modeToUse==="audio"?"block":"none";

  document.getElementById("videoTitle").textContent=title;
  document.getElementById("videoUploader").textContent=uploader||"";

  if(modeToUse==="video"){
    loadYT(id);
  } else {
    loadAudio(id, {title,uploader});
  }

  // Download
  const dlV=document.getElementById("dlVideo");
  dlV.innerHTML="";
  ["360","480","720"].forEach(q=>{
    const a=document.createElement("a");
    a.href="/api/download?id="+id+"&mode=video&q="+q;
    a.className="dl-btn"; a.innerHTML="⬇ "+q+"p";
    a.addEventListener("click",()=>toast("Download "+q+"p..."));
    dlV.appendChild(a);
  });
  const dlA=document.getElementById("dlAudio");
  dlA.innerHTML="";
  const ab=document.createElement("a");
  ab.href="/api/download?id="+id+"&mode=audio";
  ab.className="dl-btn adl"; ab.innerHTML="🎵 Audio M4A";
  ab.addEventListener("click",()=>toast("Download audio..."));
  dlA.appendChild(ab);

  if(modeToUse==="video") setTimeout(()=>prefetch(id),2000);

  loadRelated(id,title);
}

async function loadRelated(id,title){
  const list=document.getElementById("relatedList");
  list.innerHTML='<div style="color:var(--muted);font-size:12px;">Memuat...</div>';
  relatedVideos=[]; relatedIndex=0;
  try{
    const kw=title.split(" ").slice(0,4).join(" ");
    // Ambil 20 video terkait
    const res=await fetch("/api/search?q="+encodeURIComponent(kw)+"&limit=20");
    const data=await res.json();
    list.innerHTML="";
    const vids=(data.results||[]).filter(v=>v.id!==id);
    relatedVideos=vids;
    vids.forEach((v,i)=>{
      const div=document.createElement("div");
      div.className="related-card"+(i===0?" next-up":"");
      div.id="rc-"+i;
      div.onclick=()=>{relatedIndex=i;playVideo(v.id,v.title,v.uploader,v.duration,v.view_count);};
      div.innerHTML=`<div class="related-thumb"><img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" loading="lazy"></div>
        <div class="related-info">
          <div class="related-title">${i===0?'▶ ':''}${v.title||''}</div>
          <div class="related-meta">${v.uploader||''} · ${fmt(v.duration)}</div>
        </div>`;
      list.appendChild(div);
    });
    // Prefetch audio 2 video pertama
    if(currentMode==="audio"){
      [vids[0],vids[1]].forEach(v=>{ if(v) prefetch(v.id); });
    }
  }catch{}
}

loadHome();
</script>
