<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YuTube</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c26;
  --border: #2a2a38; --red: #ff2d55; --red2: #ff6b6b;
  --text: #f0f0f5; --muted: #7a7a9a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; padding-bottom:100px; }

/* HEADER */
header {
  position:sticky; top:0; z-index:200;
  background:rgba(10,10,15,0.92); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 20px; height:60px;
  display:flex; align-items:center; gap:16px;
}
.logo { font-family:'Bebas Neue',sans-serif; font-size:26px; color:var(--red); letter-spacing:2px; cursor:pointer; white-space:nowrap; }
.logo span { color:var(--text); }
.search-wrap { flex:1; max-width:540px; display:flex; }
.search-wrap input {
  flex:1; background:var(--surface2); border:1px solid var(--border);
  border-right:none; border-radius:10px 0 0 10px;
  padding:9px 14px; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:14px; outline:none;
  transition:border-color 0.2s;
}
.search-wrap input:focus { border-color:var(--red); }
.search-wrap input::placeholder { color:var(--muted); }
.search-wrap button {
  background:var(--red); border:none; border-radius:0 10px 10px 0;
  padding:9px 16px; color:white; cursor:pointer; font-size:15px;
  transition:background 0.2s;
}
.search-wrap button:hover { background:var(--red2); }

/* NAV TABS */
.nav-tabs {
  display:flex; gap:4px; padding:0 20px;
  border-bottom:1px solid var(--border);
  background:var(--bg); overflow-x:auto;
}
.nav-tab {
  padding:10px 16px; font-size:13px; font-weight:500;
  color:var(--muted); cursor:pointer; border-bottom:2px solid transparent;
  white-space:nowrap; transition:all 0.2s;
}
.nav-tab:hover { color:var(--text); }
.nav-tab.active { color:var(--red); border-bottom-color:var(--red); }

/* MAIN */
main { max-width:1300px; margin:0 auto; padding:20px; }

/* PAGES */
.page { display:none; }
.page.active { display:block; }

/* SECTION */
.section-title {
  font-family:'Bebas Neue',sans-serif; font-size:20px;
  letter-spacing:2px; color:var(--muted); margin-bottom:16px;
}

/* GRID */
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; margin-bottom:32px; }
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; overflow:hidden; cursor:pointer;
  transition:transform 0.2s, border-color 0.2s, box-shadow 0.2s;
}
.card:hover { transform:translateY(-3px); border-color:var(--red); box-shadow:0 6px 24px rgba(255,45,85,0.15); }
.card-thumb { position:relative; aspect-ratio:16/9; overflow:hidden; background:var(--surface2); }
.card-thumb img { width:100%; height:100%; object-fit:cover; transition:transform 0.3s; }
.card:hover .card-thumb img { transform:scale(1.05); }
.card-duration {
  position:absolute; bottom:5px; right:5px;
  background:rgba(0,0,0,0.85); color:white;
  font-size:11px; font-weight:600; padding:2px 5px; border-radius:4px;
}
.play-ov {
  position:absolute; inset:0; background:rgba(255,45,85,0);
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:all 0.2s;
}
.card:hover .play-ov { opacity:1; background:rgba(255,45,85,0.12); }
.card-info { padding:10px 12px; }
.card-title {
  font-size:13px; font-weight:600; line-height:1.4;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  overflow:hidden; margin-bottom:4px;
}
.card-meta { font-size:11px; color:var(--muted); }

/* PLAYER PAGE */
.player-layout { display:grid; grid-template-columns:1fr 340px; gap:20px; }
@media(max-width:860px) { .player-layout { grid-template-columns:1fr; } }

.embed-wrap { border-radius:12px; overflow:hidden; aspect-ratio:16/9; background:#000; }
.embed-wrap iframe { width:100%; height:100%; border:none; }

.video-info { margin-top:14px; }
.video-title { font-size:17px; font-weight:600; line-height:1.3; margin-bottom:6px; }
.video-uploader { font-size:12px; color:var(--muted); margin-bottom:14px; }

.download-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px; }
.download-box h3 { font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:1px; color:var(--muted); margin-bottom:10px; }
.dl-group { margin-bottom:10px; }
.dl-label { font-size:10px; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:1px; }
.dl-buttons { display:flex; flex-wrap:wrap; gap:6px; }
.dl-btn {
  padding:6px 12px; border-radius:7px; border:1px solid var(--border);
  background:var(--surface2); color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500;
  cursor:pointer; transition:all 0.2s; text-decoration:none;
  display:inline-flex; align-items:center; gap:4px;
}
.dl-btn:hover { border-color:var(--red); color:var(--red); background:rgba(255,45,85,0.08); }
.dl-btn.audio { border-color:#6d28d9; color:#a78bfa; }
.dl-btn.audio:hover { background:rgba(109,40,217,0.1); }

/* SIDEBAR */
.sidebar-title { font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:1px; color:var(--muted); margin-bottom:10px; }
.related-list { display:flex; flex-direction:column; gap:8px; }
.related-card { display:flex; gap:8px; cursor:pointer; padding:7px; border-radius:9px; border:1px solid transparent; transition:all 0.2s; }
.related-card:hover { background:var(--surface); border-color:var(--border); }
.related-thumb { width:100px; min-width:100px; aspect-ratio:16/9; border-radius:6px; overflow:hidden; background:var(--surface2); }
.related-thumb img { width:100%; height:100%; object-fit:cover; }
.related-info { flex:1; overflow:hidden; }
.related-title { font-size:12px; font-weight:500; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:2px; }
.related-meta { font-size:10px; color:var(--muted); }

.back-btn { display:inline-flex; align-items:center; gap:6px; color:var(--muted); cursor:pointer; font-size:13px; margin-bottom:14px; background:none; border:none; font-family:'DM Sans',sans-serif; transition:color 0.2s; }
.back-btn:hover { color:var(--text); }

/* MINI PLAYER */
#miniPlayer {
  position:fixed; bottom:16px; right:16px; z-index:999;
  width:320px; background:var(--surface); border:1px solid var(--border);
  border-radius:14px; overflow:hidden;
  box-shadow:0 12px 40px rgba(0,0,0,0.6);
  display:none; flex-direction:column;
  transition:all 0.3s;
}
#miniPlayer.show { display:flex; }
.mini-video { aspect-ratio:16/9; position:relative; }
.mini-video iframe { width:100%; height:100%; border:none; }
.mini-info {
  padding:8px 10px; display:flex; align-items:center; gap:8px;
  background:var(--surface);
}
.mini-title { flex:1; font-size:12px; font-weight:500; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.mini-btn {
  background:none; border:none; color:var(--muted);
  cursor:pointer; font-size:16px; padding:2px 6px;
  transition:color 0.2s; border-radius:5px;
}
.mini-btn:hover { color:var(--text); background:var(--surface2); }
.mini-expand { font-size:13px; }

/* STATES */
.empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
.empty-state .big { font-family:'Bebas Neue',sans-serif; font-size:64px; color:var(--border); line-height:1; margin-bottom:10px; }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin 0.8s linear infinite; margin:50px auto; }
@keyframes spin { to { transform:rotate(360deg); } }

.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:9px 18px; border-radius:9px; font-size:12px; transition:transform 0.3s; z-index:9999; }
.toast.show { transform:translateX(-50%) translateY(0); }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<header>
  <div class="logo" onclick="showPage('home')">YU<span>TUBE</span></div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Cari video..." onkeydown="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()">🔍</button>
  </div>
</header>

<div class="nav-tabs">
  <div class="nav-tab active" id="tab-home" onclick="showPage('home')">🏠 Beranda</div>
  <div class="nav-tab" id="tab-history" onclick="showPage('history')">🕐 Riwayat</div>
  <div class="nav-tab" id="tab-search" id="tab-search" style="display:none" onclick="showPage('search')">🔍 Hasil Pencarian</div>
</div>

<main>
  <!-- HOME -->
  <div class="page active" id="page-home">
    <div class="section-title">🔥 TRENDING & REKOMENDASI</div>
    <div id="homeGrid"><div class="spinner"></div></div>
  </div>

  <!-- SEARCH -->
  <div class="page" id="page-search">
    <div class="section-title" id="searchLabel">HASIL PENCARIAN</div>
    <div id="searchGrid"><div class="spinner"></div></div>
  </div>

  <!-- HISTORY -->
  <div class="page" id="page-history">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div class="section-title" style="margin:0">🕐 RIWAYAT TONTON</div>
      <button onclick="clearHistory()" style="background:none;border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;">Hapus Semua</button>
    </div>
    <div id="historyGrid"></div>
  </div>

  <!-- PLAYER -->
  <div class="page" id="page-player">
    <button class="back-btn" id="backBtn" onclick="goBack()">← Kembali</button>
    <div class="player-layout">
      <div>
        <div class="embed-wrap">
          <iframe id="ytEmbed" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" src=""></iframe>
        </div>
        <div class="video-info">
          <div class="video-title" id="videoTitle">—</div>
          <div class="video-uploader" id="videoUploader">—</div>
          <div class="download-box">
            <h3>⬇ Download</h3>
            <div class="dl-group">
              <div class="dl-label">Video MP4</div>
              <div class="dl-buttons" id="dlVideo"></div>
            </div>
            <div class="dl-group">
              <div class="dl-label">Audio</div>
              <div class="dl-buttons" id="dlAudio"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="sidebar">
        <div class="sidebar-title">Video Terkait</div>
        <div class="related-list" id="relatedList"><div style="color:var(--muted);font-size:12px;">Memuat...</div></div>
      </div>
    </div>
  </div>
</main>

<!-- MINI PLAYER -->
<div id="miniPlayer">
  <div class="mini-video">
    <iframe id="miniEmbed" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" src=""></iframe>
  </div>
  <div class="mini-info">
    <div class="mini-title" id="miniTitle">—</div>
    <button class="mini-btn mini-expand" onclick="expandPlayer()" title="Buka penuh">⤢</button>
    <button class="mini-btn" onclick="closeMini()" title="Tutup">✕</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let currentVideo = null; // {id, title, uploader}
let prevPage = 'home';
let miniActive = false;

// ─── Utils ───────────────────────────────────────────────────────────────────
function formatDur(s) {
  if (!s) return "";
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  if(h>0) return h+":"+String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");
  return m+":"+String(sec).padStart(2,"0");
}
function formatViews(n) {
  if(!n) return "";
  if(n>=1e6) return (n/1e6).toFixed(1)+"M views";
  if(n>=1e3) return Math.floor(n/1e3)+"K views";
  return n+" views";
}
function showToast(msg) {
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3000);
}

// ─── History (localStorage) ───────────────────────────────────────────────────
function getHistory() {
  try { return JSON.parse(localStorage.getItem("yt_history")||"[]"); } catch{ return []; }
}
function addHistory(video) {
  let h = getHistory().filter(v=>v.id!==video.id);
  h.unshift(video);
  if(h.length>50) h=h.slice(0,50);
  localStorage.setItem("yt_history", JSON.stringify(h));
}
function clearHistory() {
  localStorage.removeItem("yt_history");
  renderHistory();
  showToast("Riwayat dihapus");
}

// ─── Pages ───────────────────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".nav-tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("page-"+name).classList.add("active");
  const tab = document.getElementById("tab-"+name);
  if(tab) tab.classList.add("active");

  if(name==="history") renderHistory();
  if(name==="home" && document.getElementById("homeGrid").children.length===1) loadHome();
}

function goBack() {
  // Aktifkan mini player saat keluar dari player
  if(currentVideo && !miniActive) {
    activateMini();
  }
  showPage(prevPage==="player"?"home":prevPage);
}

// ─── Mini Player ─────────────────────────────────────────────────────────────
function activateMini() {
  if(!currentVideo) return;
  miniActive = true;
  const mini = document.getElementById("miniPlayer");
  document.getElementById("miniEmbed").src =
    "https://www.youtube.com/embed/"+currentVideo.id+"?autoplay=1&rel=0&modestbranding=1";
  document.getElementById("miniTitle").textContent = currentVideo.title;
  mini.classList.add("show");
  // Pause main embed
  document.getElementById("ytEmbed").src = "";
}

function expandPlayer() {
  miniActive = false;
  document.getElementById("miniPlayer").classList.remove("show");
  document.getElementById("miniEmbed").src = "";
  if(currentVideo) {
    document.getElementById("ytEmbed").src =
      "https://www.youtube.com/embed/"+currentVideo.id+"?autoplay=1&rel=0&modestbranding=1";
  }
  showPage("player");
}

function closeMini() {
  miniActive = false;
  document.getElementById("miniPlayer").classList.remove("show");
  document.getElementById("miniEmbed").src = "";
  currentVideo = null;
}

// ─── Card HTML ────────────────────────────────────────────────────────────────
function cardHTML(v) {
  const safeTitle = (v.title||"").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  const safeUploader = (v.uploader||"").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  return `
    <div class="card" onclick="playVideo('${v.id}','${safeTitle}','${safeUploader}')">
      <div class="card-thumb">
        <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" loading="lazy">
        <div class="play-ov">
          <svg width="42" height="42" viewBox="0 0 42 42">
            <circle cx="21" cy="21" r="21" fill="rgba(255,45,85,0.9)"/>
            <path d="M16 12l15 9-15 9V12z" fill="white"/>
          </svg>
        </div>
        ${v.duration?'<div class="card-duration">'+formatDur(v.duration)+'</div>':''}
      </div>
      <div class="card-info">
        <div class="card-title">${v.title||''}</div>
        <div class="card-meta">${v.uploader||''} ${v.view_count?'· '+formatViews(v.view_count):''}</div>
      </div>
    </div>`;
}

// ─── Home (trending/rekomendasi) ──────────────────────────────────────────────
async function loadHome() {
  const grid = document.getElementById("homeGrid");
  grid.innerHTML = '<div class="spinner"></div>';

  const history = getHistory();
  let keyword = "trending music 2025";
  if(history.length > 0) {
    // Ambil keyword dari riwayat terbaru
    const words = history[0].title.split(" ").slice(0,3).join(" ");
    keyword = words || keyword;
  }

  try {
    const res = await fetch("/api/search?q="+encodeURIComponent(keyword));
    const data = await res.json();
    if(!data.results||!data.results.length) throw new Error("Kosong");
    grid.innerHTML = data.results.map(cardHTML).join("");
  } catch(e) {
    grid.innerHTML = '<div class="empty-state"><div class="big">▶</div><div>Gagal load. Coba cari video dulu.</div></div>';
  }
}

// ─── Search ───────────────────────────────────────────────────────────────────
async function doSearch() {
  const q = document.getElementById("searchInput").value.trim();
  if(!q) return;

  // Kalau lagi di player, aktifkan mini player dulu
  if(document.getElementById("page-player").classList.contains("active") && currentVideo) {
    activateMini();
  }

  prevPage = "search";
  document.getElementById("tab-search").style.display = "flex";
  document.getElementById("searchLabel").textContent = 'HASIL: "'+q+'"';
  document.getElementById("searchGrid").innerHTML = '<div class="spinner"></div>';
  showPage("search");

  try {
    const res = await fetch("/api/search?q="+encodeURIComponent(q));
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    if(!data.results.length) {
      document.getElementById("searchGrid").innerHTML = '<div class="empty-state">Tidak ada hasil untuk "<b>'+q+'</b>"</div>';
      return;
    }
    document.getElementById("searchGrid").innerHTML = data.results.map(cardHTML).join("");
  } catch(e) {
    document.getElementById("searchGrid").innerHTML = '<div class="empty-state">Error: '+e.message+'</div>';
  }
}

// ─── History page ─────────────────────────────────────────────────────────────
function renderHistory() {
  const h = getHistory();
  const grid = document.getElementById("historyGrid");
  if(!h.length) {
    grid.innerHTML = '<div class="empty-state"><div class="big">🕐</div><div>Belum ada riwayat tonton</div></div>';
    return;
  }
  grid.innerHTML = '<div class="grid">'+h.map(cardHTML).join("")+'</div>';
}

// ─── Play Video ───────────────────────────────────────────────────────────────
function playVideo(id, title, uploader) {
  // Tutup mini player kalau ada
  if(miniActive) {
    document.getElementById("miniPlayer").classList.remove("show");
    document.getElementById("miniEmbed").src = "";
    miniActive = false;
  }

  currentVideo = {id, title, uploader};
  addHistory({id, title, uploader, duration:0, view_count:0});

  // Set prev page
  const activePage = document.querySelector(".page.active");
  if(activePage && activePage.id !== "page-player") {
    prevPage = activePage.id.replace("page-","");
  }

  showPage("player");
  window.scrollTo(0,0);

  // Set embed
  document.getElementById("ytEmbed").src =
    "https://www.youtube.com/embed/"+id+"?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3";

  document.getElementById("videoTitle").textContent = title;
  document.getElementById("videoUploader").textContent = uploader;

  // Download buttons
  const dlVideo = document.getElementById("dlVideo");
  dlVideo.innerHTML = "";
  ["360","480","720"].forEach(q=>{
    const a = document.createElement("a");
    a.href = "/api/download?id="+id+"&mode=video&q="+q;
    a.className = "dl-btn";
    a.innerHTML = "⬇ "+q+"p";
    a.addEventListener("click",()=>showToast("Download "+q+"p dimulai..."));
    dlVideo.appendChild(a);
  });

  const dlAudio = document.getElementById("dlAudio");
  dlAudio.innerHTML = "";
  const ab = document.createElement("a");
  ab.href = "/api/download?id="+id+"&mode=audio";
  ab.className = "dl-btn audio";
  ab.innerHTML = "🎵 Audio M4A";
  ab.addEventListener("click",()=>showToast("Download audio di
